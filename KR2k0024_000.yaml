body:
  text: 昌國州圖志地理類三都會郡縣之屬提要臣等謹案昌國州圖志七卷元馮福京郭薦等同撰福京潼川人官昌國州判官薦里貫未詳官鄞縣教諭昌國州即今定海縣宋熙寧六年置昌國縣元至元十五年始升為州此書成于大德二年七月凡分八門曰敘州曰敘賦曰敘山曰敘水曰敘物産曰敘官曰敘人曰敘祠前有福京序據序中所述始末蓋福京求得舊志屬薦等訂輯而福京為之審定者也其大旨在於刋削浮詞故其書簡而有要不在康海武功志韓邦靖朝邑志下海書邦靖書為作者盛推而此書不甚稱於世殆年代稍逺鈔本稀傳歟據原目所載卷首當有環山環海及普陀山三圖圖志之名實由於是此本不載蓋傳寫者佚之矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀昌國州圖志前序史所以傳信傳而不信不如亡史故作史者必擅三者之長曰學曰識曰才而後能傳信於天下蓋非學無以通古今之世變非識無以明事理之精微非才無以措褒貶之筆削三者闕一不敢登此職焉然而有天子之史有諸侯之史晉之乘楚之檮杌魯之春秋是諸侯之史也後世因之郡各有志所以備天子史官之採録亦豈可易為哉若昔素王刑賞二百四十二年列國之君臣遊夏且不能贊一辭司馬氏以良史才而作史記議者猶謂十二諸侯年表為殽亂於聖經然則侯邦之志亦以記事纂言也而可易為哉往宋末運人主好諛宰相𨗳諛士大夫習諛內外遂以成風操史筆者多患得患失之夫希合顧望不惟泯其實以誣公朝之是非抑且駕其虛以騁私意之向背故光寧理三朝之史皆權臣黨與之蕪辭而郡縣間一時之志亦侯牧誇張之誕筆今宋史既與國偕亡惟志書之見於郡縣間者版籍所計或以寡為多風土所宜或以無為有形勢所在或以險為夷貢賦所出或以儉為泰評人物則多過情之譽陳民風則少退抑之辭粧飾富麗競為美觀詳核其實百無一二茍上之人按其圖數其貢流毒貽害可勝言哉昔蕭何入關收秦圖籍文書具知虛實險要用以相漢厥功茂焉藉使今世或有踵蕭何之智信往宋所存之記載責其實於天下郡國豈不敗乃公事余益以悲世變之至宋獨圖籍文書一事鑿空駕偽顧不如秦之猶為務實而且貽禍於來世蒼生也昌國中海而處由縣升州而州志不作此固僕厮吏不知稽古之務而為士者亦有罪焉余來首訪圖經徒起文獻不足之歎越歲餘始於里民搆獲其籍大率浮誇如前所云議欲刋削且書混一以來之沿革既以授州之文學士屬余往吳中此事遂廢今瓜戍已踰滯留卧疾豈其機乎乃趣學官捃托舊載芟其蕪黜其不實定為傳信之書使州之闕文著於所補以俟掌建邦之六典者采焉故序作史之大略與異時文勝其質之流弊俾二三子知所治擇而復有以告之孔子曰吾猶及史之闕文也嗚呼史闕則綱紀將板蕩而無稽是豈斯民之幸聖人猶幸闕文之及見者蓋逆知他日諸侯惡其籍之害己而去之也今余於舊志得之既難本復無二二三子不亟圖之余幸而受代則是籍之存於有司者幾矣嗚呼猶欲及於闕文得乎大德戊戌七月朔日潼川馮福京序
