body:
  text: 昌國州圖志卷一元馮福京等編敘州沿革州在東海西星紀之次牽牛婺女之分野昔夏后氏帝少康所封庶子於越之地至越勾踐滅吳獲夫差欲使居甬東君百家杜預云句章縣東海中州也國語以為甬句東注云句章海口外州今州有甬東村是已由秦厯漢屬鄮縣唐開元二十六年以鄮縣置明州領縣四曰翁山今之昌國也立縣始於唐五代時改鄮為鄞則又屬鄞往宋端拱二年始置鹽場熙寧六年部使者以蓬萊安期富都三鄉居大海中期㑹不時置尉主鬬訟之事既而創縣名為昌國意其東控日本北接登萊南亘甌閩西通吳㑹實海中之巨障足以昌壯國勢焉八年又益以定海縣之金塘鄉紹興十三年户部員外郎沈麟編類民籍户計萬餘而丁口再倍德祐元年丙子三月聖朝混一今中書左丞行浙東道宣慰使哈巴岱提師壓境遂歸附焉是為至元十三年縣仍舊至元十五年三月朝廷謂海道險要升縣為州以重其任時劉思義受宣武將軍達嚕噶齊以州印來領州事當混一之初人心帖泰實嘉賴之至元十七年復置縣𨽻于州二十七年縣仍廢止單州焉境土州所轄四鄉一十九都與州通陸僅富都鄉九都而已金塘四都在州之西北安期三都在州之東南蓬萊三都在州之東北星羅棊布全賴舟楫之利以通舊志皆以潮數約其里之逺近然海面際天未可以里計今姑存之東西五百里南北三百里西南至本路三百五里東五潮至西莊石馬山與髙麗國分界南五潮至龍嶼與象山縣分界西一潮至蛟門山與定海縣分界北五潮至大七山與平江路分界東南三潮至韭山與龜山縣分界西南二潮至三山與定海縣分界東北五潮至神前壁下與海州分界西北三潮至灘山與嘉興路分界風俗壤地褊小又皆斥鹵穀粟絲枲之産雖微漁鹽舟楫之利甚博無恆産而有恆心者惟士為能風聲氣習有於越之俗焉公宇州治坐鎮鼇山下山自北來為龍峯蜿蜒南走突而小峯州治據其麓州門中門廳鎮鼇堂廳後中堂敬簡齊廳事後西偏吏目司架閣司吏舍蓬萊道院廳東偏愛蓮堂州治東偏前有蓮池拂雲亭州治後山海光亭拂雲亭之上城郭州城周廣五里城門六所重門擊柝以待暴客則封域之有扄鍵尚矣舊無之升州後所創也東江門東隅西門西隅南門南隅上榮門北隅舟山門西南隅艮門東北隅舊名虞家橋坊巷申義坊學所從入即州學講堂扁而名平近坊州治東清晏坊州治西詩禮坊州治東首登坊州之東聯桂坊州治北往宋嘉定間為趙時恪時慥兄弟登第立神童坊上榮往宋嘉熙間為應翔孫試中童科立德政坊舊名拱星州之北德星坊州西南圖南坊南門惠應坊城隍廟從入中洲坊正監前教愛坊市橋西為民救母病立印元坊市橋之左興行坊市橋東為其民救父病立登朝坊市橋之右西上坊西門外德麟坊舊丞廳南今廢信麟坊舊丞廳西甬東坊甬東今廢東明坊東江今廢社稷壇在州西門外去州一百步城隍廟在州南世茹侯維廟之神今州有茹侯村則侯鄉人也侯英烈忠毅至今父老能言之往宋建炎間賜惠應廟額倉局永豐倉舊係往宋縣丞廳至元十七年升州遂為縣治縣既廢改為倉專以儲本州官民田所納之租海上諸鎮守司附州稍近者軍士於此支給月糧大德二年春今中書左丞行浙東道宣慰使鎮遏海道到州謂倉之四顧人户頗疏乃理中廳五間為倉屋兩廊析為軍營後堂以處鎮守官於是倉營雜處蓋以備不虞倉使一人本州設官鹽局至元二十七年以繫官房舍一間為之在中洲之北使副各一人本州設昌國州圖志卷一
