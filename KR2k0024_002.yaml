body:
  text: 昌國州圖志卷二元馮福京等編敘州學校學舊在州東一百步往宋熙寧八年令張懿文所建元祐七年簿尉顧復又徙而東四十步淳熙十六年令王徙於丞廳之南役未竟去官令錢棣其後始克有成嘉定甲申令趙大忠治增益然始創之規逼仄環學皆水終不能有所展拓潔齊袁燮記闡斯道之奧發是心之良而輔成國家之風教者其惟學乎夫學之於人猶食之有榖粟猶衣之有桑麻也豈可一日闕哉四明之有昌國海中一島也厥地狹矣而士生其間俊敏逸羣修潔自將者時時有之其質美矣加以切磨培植之功孰能而禦之前乎此非無賢令尹也而教養一事多闕而不備豈不知當務之為急哉或者其興若廢與兵刑財用不同非有朝家之威命大吏之督責姑徐徐焉未見其獲戾故雖有所興為不過一二焉而止亦其勢然也若夫發於誠心無所畏尊而自為之其度越他人顧不逺哉今承議郎趙侯清獻公之裔孫也典刑猶在喟然興嘆曰事豈有不可為者哉力或不足痛節冗費可也檢柅吏奸毋俾侵蝕可也義所當為勇於必為可也士有強力資以為助可也如是而後其用足焉左之右之莫不如志而建學之規模具其中矣或因其故而葺治之或創其新而增益之曰殿曰堂屹然中居曰齊曰序翼然旁列門庭由是壯焉像設由是崇焉祭器祭服由是作焉廪廥以儲之垣墉以衛之承學之士皆得優游涵泳其中而又課焉試焉以警厲之鳶飛魚躍咸受其賜無有終極可不謂盡於其職乎且南安一小郡耳而東坡蘇公記學之成稱其甲於江西禮殿講堂視大邦君之居典領得人能使其居官大理固然也今侯之所為其亦若是也夫雖然侯之設心非獨兹事也嚴祈報之典則冢土是崇恤窮乏之民則委積是豐户籍之核所以窒欺僞也海步之就與夫嶺路之夷又所以便往來也凡有益於民者是究是圖如恐不及矧為禮義教化之官其汲汲也宜如之何侯名大忠三衢人擢進士科居官所至可紀無忝厥祖矣余是以深美之歸附後升縣為州學亦隨之至元十七年各道設提學司實五品官遂僭擬教授董學事至元二十九年省府例以下州不設教授止存正録學官二員學正學録儒户五十八户至元二十九年抄定之數其時强有力之司存頗多間有逃而之彼者今雖欲歸儒非申請于上不可聖㫖長生天氣力裏大福廕護肋裏皇帝聖㫖據尚書省奏江淮等處秀才乞免雜泛差役事准奏今後在籍秀才做買賣納商稅種田納地稅其餘一切雜泛差役並行蠲免所在官司常加存恤仍禁約使臣人等毋得於廟學安下非理搔擾准此至元二十五年十一月缺日上天眷命皇帝聖㫖諭中外百司官吏人等孔子之道垂憲萬世有國家者所當崇奉曲阜林廟上都大都諸路府州縣邑應設廟學書院照依世祖皇帝聖㫖禁約諸官員使臣軍馬毋得於內安下或聚集理問詞訟褻瀆飲宴工役造作收貯官物其贍學地土産業及貢士莊諸人毋得侵奪所出錢糧以供春秋二丁朔望祭祀及師生廪膳貧寒老病之士為衆所尊敬者月支米糧優恤養贍廟宇損壞隨即修完作養後進嚴加訓誨講習道藝務要成材若德行文學超出時輩者有司保舉肅政廉訪司體覆相同以備選用本路總管府提舉儒學肅政廉訪司宣明教化勉勵學校凡廟學公事諸人毋得沮擾據合行儒人事理照依已降聖㫖施行彼或恃此非理妄行國有常憲寧不為懼宜令准此至元三十一年七月缺日大成殿三間自遷學後殿宇頽圮往宋淳祐丁未令沈壡重建郡人尚書王應麟記淳祐紀元之六年聖上首善崇化以風四方緑字穗書敷賁雍頖庠聲序音丕冒出日昌國大夫沈壡始至謁校宮時禮殿之建適六十祀矣朽蠧弗葺諸生進而言曰學肇基于縣治之東淳熙間王令阮遷于芙蓉洲西挹秀涵清氣勢閎偉俊人魁士含章挺生道原文脉實繫兹殿盍鼎新之對敡雲漢作人之休德君曰承流宣化職也敢不祇若嗇用鳩工士歡趍之參預應公嘉其意諗帥守顔公佐以郡少府錢經始于明年暮春越季夏殿成般爾獻巧枚枚奕奕貌象惟肖如臨沂泗侑坐綴食端章儼䓇陟降庭止式禮莫愆冠進衣逢瞻儀興敬觀摩麗習文風藹如明年君入監左帑相與祠于學既十年諸生思之請著石章應麟鄞末學也辭弗獲嘗讀臨之象曰君子以教思無窮夫澤上有地猶君子之近民也近民則教彌數故周官族閭讀法視州黨尤密今之學郡修而邑弛為吏者政急而化緩期㑹訟獄日緦緦畏百適慮不越几桉而夫子宮墻漫不省健者舞知怠者視蔭辨髦武城蒲密之言而諉曰難治教化不明醇澆朴散治不愈難與然非獨今日也漢東京儒雅最盛令長垂意學校者惟宋圴楊仁著于傳何其寂寥哉沈君能急所緩喟然興於學可謂知本矣昔夫子慨道不行託興於桴海是邦近天子之光家詩書人孝悌吾道其行矣乎縣大夫雖不得宿其業以俟道化之成後之君子勿替引之率時髦士規聖矩賢毋以小成自畫學必正大志必髙明言必仁義行必篤敬進而經綸天下之大經退而居賢德善俗俾耆老搢紳顧瞻楹桷肅然改容曰此賢令教思之澤也將見立于朝者為皋稷入其里者比鄒魯尚當墨筆以頌化民成俗之功云歸附後元貞乙未州判官馮福京始至首勉學之士協力修理由內及外為之一新時學正馮庚苟世英也州判記天下定于一一者何道是已是故三代之得天下以仁得此道也恭惟皇帝嗣登大寶嘉與天下洗濯維新他未遑及首發明詔惠顧學校使秀於民而為士者有鳶飛魚躣之樂無風震雨凌之恐所以尊崇斯道者恩至渥也下土一介臣福京授闕銓曹來佐昌國凜凜乎懼學舍之將就頽圮以不稱聖朝新美之造日與諸生是究是圖永肩一心遂集羣力殿堂齊廡修理既完訓蒙有育德之堂櫺星敞闔闢之户惟是始創之規地勢逼仄環學皆水雖欲充拓無下手處矣諸生來言曰吾黨於此既幸而獲全性命于國家混一之餘聖恩隆厚又幸而弦誦之安其業游息之有其所其可自同於蚩蚩之氓而不知帝力之有哉乃者護持廟學之詔㫖未克寫諸琬琰以寓諸生觀省迪厲之忱兹不為大闕典乎於是鳩工礲石刋諸禮殿之前晨薰夕燈丕照對越雖邈在海洲不啻天威之咫尺也因謂諸生曰學既修矣諸生亦知所以自修者乎修道之教所以率性保命也修辭立誠所以居業進德也修其天爵所以置人爵於無足言也茍惟夏屋渠渠之是修而不能修其身於暗室屋漏之頃其如修學何古人自入大學已習為治國平天下之道故胸中所存皆尊主庇民之事業用之則其道行不用則其學𫝊決不虛生虛老於一世諸生居則曰不吾知也如或知爾則何以哉無亦以任重道逺之事施諸身以一日必葺之規施諸學則芃芃棫朴薪之槱之庶不負聖天子向用斯道之意先聖先師羹墻如見洋洋乎是所望於諸子也乃托儒籍之與有力於修學者刋其姓名于下方以為來者之勸云元貞丙申中秋日潼川馮福京講堂往宋嘉泰三年令葛洪建扁曰申義參政樓公鑰書申義堂三大字并為之記東陽葛容父洪為昌國令於縣庠之講堂名曰申義求書其扁余喜葛君知政之樂為又樂堂名之佳既為之大書矣而復為之記余分教永嘉時作序齒文以示諸生其略曰孔子稱甚矣魯道之衰也洙泗之間齗齗為相遜孟子曰謹庠序之教申以孝悌之義頒白者不負戴於道路矣夫洙泗之間行者相遜何以為魯道之衰謹庠序之教何與於道路之負戴者及究其說漢地理志云魯瀕洙泗之水其民涉渡幼者扶老而代其任俗既益薄長老不自安與幼者相遜也徐廣又曰蓋幼者患苦長者長者忿愧自守故齗齗爭辭所以為衰也想其盛時老者晏然如父兄之役子弟無復相遜子所謂老者安之殆為此也孟子亦謂孝悌既申則頒白負戴少者自當代之噫後世教養士子以科舉得人之多寡為庠校之盛衰者與古意豈不逺甚昌國甬東也民以漁鹽為業近世儒風日興而猶未盛葛君崇教化以善其俗一聞余言則曰此名堂之本意也始余從弟鏞尉東陽而歸余啓得人之問以容父為稱首兹為鄉邑治聲固已卓然又將興學化民以幾古人之意誠非文法吏所能為者齊變至魯魯變至道顧不在兹乎鑰既為之記而命鏞弟題其上越明年慈湖先生楊簡復記於其後嘉泰四年春昌國葛令君訪簡於慈溪石魚對語從容及邑學忽作而言曰名學之堂以申義願簡申之簡欣然奉命令曰此人心所自有惟申而明之爾簡於是益喜令言至當厥明叙而書之孔子曰人者天地之心又曰心之精神是謂聖孟子亦每每道性善又曰仁人心也大哉斯言蓋萬世人心所自有之靈人孰不愛敬其親有不愛敬其親者非人也人孰不知徐行後長有不後於長者非人也此心之所自有也不學而能也不慮而知也心之精神是謂聖果如吾聖人之言也其有不然者非其心之罪也惟民生厚因物有遷感於物而昏也心之精神無方無體至靜而虛明有變化而無營禹曰安汝止明其本靜止也舜曰道心明此即道也夫孝天之經地之義人之行事親事長乃天地之心列聖之道可不自知自敬乎齊舊有四造道進德存心成性至元壬午本學申請于提舉司添置兩齊曰明善曰立禮其實㭊四齊之屋為之小學學東廡之南舊名親仁齊歲久不治至元貞乙未州判官馮福京重行修蓋扁曰育德堂専以為訓蒙之所請鄉之耆宿郭薦應季挺任教𨗳焉且為之記天生蒸民有物有則民之秉彛好是懿德則孩提之童其德固已渾然及其長也是宜天下無不善之民矣然而世有汙隆之異人有君子小人之分豈天之降才爾殊也無乃教道之不興而習俗之汚染也康節邵子曰上品之人不教而善中品之人教而後善斯言豈欺我哉自非生知安行之上智其有不待品節裁成之教而能德勝其氣哉是故古之君子欲明明德於天下者上自王宮國都下至比閭族黨修道之教靡敢一日而廢然而教之必有其序未始躐等而施故童蒙之養聖人慎焉自胄子之教昉興於帝朝而家有孰黨有庠小學之教遂盛於閭里今散見於傳記間者能食教右能言教唯以至視聼坐立灑掃應對莫不有教逮十歲而出就外𫝊則其朝夕之所薰陶氣習之所變化已克念其希聖希賢之質又五年而始入大學教以格物致知修已治人之事知類通逹有如時雨化之者則其德業之成就詎可量哉此隆古盛時道行俗美臣焉而忠子焉而孝人皆有士君子之行者蓋自幼至壯日日時時生生不息之歲月無適而不用其涵養漸摩之教也州庠舊有小學頽圮弗治草蔓湮塞余始至而懼焉諗于衆曰聖人之教有始有卒小子之學焉可廢也遂掃地而一新之厥既訖工乃取蒙養之義書育德堂三字扁焉専以為發蒙之所而記夫教之不可逭者如此庶不負菁莪樂育之造云臺門舊有五間圮毁已久至元甲申重建攝教應季挺實董其事改扁州學二字櫺星門舊植六柱啓六扉歸附後門遂不存元貞元年州判馮福京重建存禮制也祭器舊所存者歲久刓弊簡陋弗完往宋進士趙若諘考訂禮經參以紫陽朱子釋奠圖更造視他學稍整今多損闕未有能新之者籩六十豆九十簠三十三簋三十二篚五爵三十八尊五杓七坫二十六奠盆十五罍三洗二羃巾七几十二黃絹帳額子燭臺二十木楪百二十禮服禮冠十禮服十中單十珮十錢糧舊管水田五百九十三畝四十五步二分園地山地柴山一千一百三十二畝三角四十七步砂岸三所屋二座坊基四所舊收米二百二十一石一斗六升六合穀四石錢九百一十二貫六百八十七文十八界續添田地園山舊志無畝步係郎孝祥沒官業見徵數內巖耗十定舊無之始於元貞二年馮州判經理米折省斛一百五十九石七斗六升三合七勺五抄穀二十七石四斗二升二合小麥折省斛三十九石八斗五升八合六勺五抄豆折省斛一十六石八斗二升五合長短岩租中統鈔一十錠貢士莊舊於往宋咸淳年間令姚濂任內以邑民張氏爭訴立嗣縣以其家産業五分之一申于府于臺于部照應𨽻學置莊專為貢選士人計偕之費歸附後至元十七年升州存縣以本莊田糧歸學後縣革而學亦廢有司收係入官逮至元甲午欽奉聖㫖節該贍學地土産業及貢士莊諸人毋得侵奪欽奉如此雖屢告於有司迄今未歸諸學舊管田七十六畝三角一十步地八十二畝三角四十五步山二百丹二畝三角一十七步內除亭户占種及撥付文昌宮實管數見後係官項下舊收米一十二石七斗穀八十八石一斗小麥三十石一斗五升烏豆一十二石六升租錢四十六貫十八界除見徵數見官租項下餘無所稽舊規式鹿鳴宴主賓每位支三十貫文緑羅每匹折送八十貫文鄉舉一百二十貫漕胄宗室舉八十貫宗室取應舉四十貫鄉舉過省二百貫漕胄宗室過省一百五十貫宗室取應過省一百貫鄉舉廷對三百貫漕胄宗室廷對二百貫宗室取應廷對一百貫鄉補四十貫漕胄宗室補三十貫升上庠釋褐照過省例一百五十貫升宗庠釋褐照過省例一百貫以上舊志所載今存之者欽覩詔書有議行貢舉之法以待來者有考焉翁洲書院書院在州治之北往宋帥機應公傃讀書之所登進士第姪應公㒡接踵魁多士官至參政於淳祐年間理宗書賜翁洲二字因以為名宗族姻黨之子弟肄業於中聖朝混一各道建立提學司首以應翔孫任山長而江浙行省例以為闕本院素無田産翔孫於元貞乙未帥其子姪撥已分産𨽻書院公其出納以為教養之資州判官馮福京記翁洲書院往宋參政應公葺芷先生讀書之所也先生由此奮身以詞賦魁天下士立取要官薦登政府急流勇退歸榮故鄉翁洲為昌國别名理宗書以寵光其居第先生遂以扁書院延師其間率其子弟及族之人與夫鄉之俊秀皆造焉講肄程式一遵晦庵朱文公白鹿洞規襟佩兟兟禮樂秩秩實為一方精舍之望先生遺世越三十年大元混一行省例取以充山長之選厥有既受檄謂無以為養皆望洋而不至則以其族之儒而耆者董行教事且望舍菜而已歲在乙未曰天定者以省親辭去白之州州俾學正攝聞諸府遂次第以達行省之聼繼準命下詰問資糧之有無存設之當否州謂院既無於寸産士又𨽻於州庠教養咸闕不可徒冒其名具以實告行省幾去其闕先生之猶子全軒翔孫義形於色曰不可使家世詩書之業自我而墜乃輟已分田𨽻書院公其出納以贍師生告諸提舉司轉聞省議韙之遂得不廢首選嚴陵何君燁之來任山長事實大德改元之蠟月也乃􅅹龜朋之吉載刋鹿洞之規爰采新田重恢舊觀於是何君來言曰書院幾廢而復興子實與聞其事願為之記以示後人鳴呼士無志古道之行久矣三代盛時五家為比家有孰焉五百家為黨黨有庠焉為庠者三十而後合於鄉鄉即遂也遂有序焉由遂而達於為方百里之國若庠若序何可勝計則是無尺地而不興學無一民而不受教雖兔置﨣赳之夫皆麟趾振振之士三歲大比王拜賢書實井田中德行道藝人也其孝友睦姻任恤之風至今猶可想見豈若後世之郡邑或百里或千里而後有一學又必俟有司之建立縣官之經費哉往宋初造如四書院亦鄉自為之非出於在上者之驅迫其意甚古自是邈乎無聞今書院再創於翁洲不惟繼志述事以有得於窮神知化之妙且將推一家禮義之澤以漸沐其鄉里又使黨庠遂序之遺風見諸當世可謂一舉而三得甚盛甚偉非志於古道而篤於力行者能之乎因發余之緒言告夫二三子者以為切磨之益參政公書院之創為宗晦庵之學像而祠之所以使來游來歌者之目擊而道存也二三子知之乎晦庵於經講說殆遍平生精力萃在論孟庸學之四書蓋謂學者必學於此而後能得夫窮理正心之方以為修已治人之本故為之章句為之輯略又設為或問惟恐辨之不明發之不盡所以嘉惠後學之盛心勤且忠矣今其書具存上自公卿大夫下至齊民之子莫不家𫝊而人誦固宜君子得聞大道之要小人得蒙至治之澤若大學序文之言矣數十年來庠序日廣而道學愈不明士籍日增而心術愈不正其故何哉無乃學者誤於眼耳之見聞不能真體實認而知行之未至耳大抵晦庵之書論辨反覆訓釋詳明析事理之精微無毫釐之滲陳漏故讀之者一開卷間口未絶吟而其理已粲然畢於前不待思索皆自以為有得逮夫卷方釋手一回顧頃則向者粲然畢陳之理已若空中之華罔然復無所見然則暫曉了於手披口誦之間不浹洽於躬行心得之妙信奚益哉此道學所以不明心術所以不正遂使儒先之傳注幾為聖經之贅疣蓋不善讀書者之罪也謝顯道嘗以記問自矜明道程純公以玩物喪志語之是知誦言而忘味者則言乃道之障礙伊川程正公以易𫝊授尹彥明曰只說得七分學者須自體究是知由辭而得意者則辭乃道之筌蹄此伊洛諸老之成就後學悉皆引而不發優而柔之使自求之饜而飫之使自趣之蓋欲其深造自得實有以見夫道體之大全非徒從事言辭而已也昔王文公注易或曰加詳焉使學者易知何為而不可曰不可也易知則學者將不思不思則其知也非自得之知㫖哉斯言此其為後學慮者夫豈訓詁諸儒之所及哉孔子曰學而不思則罔思而不學則殆孟子曰心之官則思思則得之不思則不得也二三子其思之乎猶待警發鞭䇿乎所學所得果何物哉道是已六經皆載道之文然道非心外物顧思與不思耳思之思之而又思之若有神物以通之超然而覺頓然而悟洞洞屬屬之輝光全心皆道膠膠擾擾之酬酢大道即心出處語默之間造次顛沛之頃以至起居飲食之徴將無須臾而非道心之形著矣思至於是復何思哉達則道行於世非已之逹窮則道藏諸身非已之窮行藏係道已奚與焉矧今聖明御極詔天下郡國養士且議行貢舉制猗歟盛哉二三子何患乎道之不行也余他日於山澤樵漁之間聞有自海濱而應聘者必將以為翁洲之士也二三子其試思之則無負全軒作新書院之意亦何君逺來開堂之所樂云堂舍若干椽田土若干畝此有司事故不書大德戊戌正月望日記學官一員山長屋宇門樓五間燕居一間齊二曰詩曰禮講堂三間扁曰德善堂祠堂二間本晦庵朱文公儒先二應公田土水田四十畝塗田一百五十畝歲收水田租穀六十二石九斗塗田租穀每歲與佃户兩平抽分豐歉不等岱山書院書院在岱山因以為名往宋咸淳癸酉里人魏矩等請於郡以岱山廢酒坊空官地建立未就緒而歸附焉恆産皆無近於至元三十年本處鹽場官徐應舉朱許芳買民屋三間遷于市以存其名江浙行省未知其詳例以為闕學官一員山長屋宇屋三間一廈田無醫學學在州前真武宮之南至元二十九年醫提領許若壁陳錫夀李繼之買民屋以建前以祠三皇聖像後以為醫生講肄之所至元甲午胡逢辰以儒者流精於倉扁之術來為學正醫生賴其啓迪義莊舊有田一百二十一畝地一十八畝歲收米九十一石麥五石專以濟鰥寡孤獨之民今歸有司社倉舊有田六十七畝淳祐十二年縣令費詡建屋二十楹於龍峯山門之左且率鄉人士祖朱文公遺意醵金於浙右米艘之至頓糴以蓄其中遇青黃不接艱食之時則平價以糶歲以為常亦賑饑之美意也歸附後倉燬于火遂廢云囚糧往宋嘉定己卯縣令於縣治之西取在官之田歲可入粟十斛又取富都中莊洋官田一十七畝歲可入粟二十三斛吏為掌之以濟在囚無親族之供贍者亦良法也今歸之有司鄉村富都鄉占東西北總九都里二德行里鼓吹里村二甬東村在東茹侯村在南􅓝八十三曉峯門鹿螺頭小中莊小河盤嶼大茅小茅東江楊􅓝謝浦翁浦洞􅓝嚴家􅓝澤浦鄭􅓝劉嶺東寺􅓝姚家􅓝祝家􅓝大􅓝小􅓝馬􅓝蘆花苔浦孟家􅓝沈家門田公􅓝大剪下塘頭王大簄􅓝丘家南􅓝東村施家􅓝小蘆釣嶼沈家􅓝松子麻嶼泄􅓝螺門小枝郎家􅓝東湖北墠虞家􅓝大河小砂􅓝小剪東茅洋蠶良􅓝大舟大蘆干三松江五百􅓝小舟中莊溪口李家􅓝紙甓侯家􅓝東山浦東南墠溪彈蘇仲西山頭宜坑水泉白泉東湖西湖虞家􅓝柯梅缺􅓝郎家􅓝大茅嶺長嶼軍亭大青安期鄉占東南總三都里一三山里村三桃花村在東南馬秦村在東扶桑村在南􅓝四十七梅岑外黨桑木灣裏黨長股短股木丘黃砂大馬秦沙角螺􅓝小馬秦蠣􅓝富溪冊子陳家􅓝石述枝􅓝南田吳農北田北砂桃花登部千步砂黃􅓝石濱崑十東弄嘉芹下砂大田蝦䗁黃砂外􅓝杜莊車敖郎家東西􅓝硃􅓝中心浡塗厲􅓝東茒峴竹頭吳家跳金塘鄉占西南總四都里一湖上里村二大􅓝村在西烈港村在南􅓝四十三五百􅓝鑿﨑上周上林黃將􅓝三家村裏􅓝大􅓝塔頭夏家􅓝上干泗洲􅓝東堠西堠小里蛤蜊􅓝烈港岑江宣家􅓝漲史扶桑盤􅓝大沙小沙外􅓝青􅓝長白馬墓宜山孤史冊子岑江背秀山秀枝雙鴉章門石屋厲􅓝長塗跋􅓝深水灌門許家􅓝稠江冊子海西蓬萊鄉占東北總五都今併為三里一岱岸里村三岱山村在東北朐山村在西北北界村在北􅓝六十九髙亭南亭西􅓝莆洋白峯青橫谷􅓝松嶼頭鄭家􅓝千步砂戽斗秦頭岱支裏􅓝砂塘下東􅓝嶽子峮頭戚家砂下茒石述佘浦朐東地砂桑子岩子楊公同後􅓝化坑楊公額三姑洋山馬跡黃家􅓝䲔門嘉湖關􅓝巉菱湖礁􅓝北砂大小田􅓝大􅓝頭外石泗頭􅓝苔阱長表頭裏行叫兒墓􅓝上黃砂雞鳴深水大小馬公􅓝福立下黃砂神前西莊干斜􅓝吟大盤石同東枯缺華大小壁下大發澤下王家􅓝昌國州圖志卷二
