  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0024_WYG_003-1a, image: WYG0491/WYG0491-0284c.png}
body:
  text: 昌國州圖志卷三元馮福京等編敘賦大學曰有徳此有人有人此有土有土此有財有財此有用然天地生財止有此數不聚于民則聚于官故賦歛頗重則民無以為生此聖人所以言財用必先之以有徳理財正辭必歸諸義而禹貢亦曰庶土交正底慎財賦詳味慎之一辭其取於民有制矣其仁天下之心可見矣户口往宋紹熙舊志主户七千六百六十五口二萬三千一十四客户五千八百七十六口一萬八千四百八十八紹熙至徳祐丙子又八十餘年生聚日繁蓋亦倍蓰矣歸附後至元二十七年通行抄數概管户二萬二千六百四十口一十二萬六千丹五民户二萬一千六百丹六内皆人户四十三儒户五十八竈户七百丹三醫户四十三匠户五十四軍户一百七十一打捕户六僧道四十三處計口一千三百五十八僧道往來不常未可指為定數田糧舊志輸納苗米之田不載以秋税之數攷之徵米三千二百四十四石六斗二升八合二勺除各寺院田不起租米四百一十二石九斗四升六合外該徵二千八百三十一石六斗八升二合二勺此文思院斛以今省降斛折之止該一千九百三十九石七斗一合今考在官之籍詳具于后諸色田土共計二千九百二十二頃三十七畆九分三厘官民寺觀總數民苗田一千三百八十二頃六十四畆八分内有逃避房屋一十二間納秋税中統鈔一十四兩四錢秋糧二千六百九十九石九斗八升九合夏税中統鈔一百六十一定四十九兩九錢六分七厘舊志夏税雖有紬絹綿子之數實皆折錢混一以來朝廷以浙東福建為近邊之地特加優恤未行起徵至大徳元年始以民苗為數每石徵中統鈔三兩以為夏税焉是年十月準奉上司文字欽奉聖㫖節該被灾人户合納税粮損及五分之上者全行倚免有灾例不該免以十分為率量減三分其餘去處普免二分江南新科夏税今年盡行倚免已納到官者准算來歳夏税欽此海邦百姓鼓舞慶快何以補報聖恩哉係官田土五百一十三頃八畆七分三厘秋糧一千六百八十五石八升内有粳榖一百八石七斗八升一合塗田塗田者乃海濱塗汎之地有力之家累土石為隄以捍潮水月日滋久塗泥遂乾始得為田或遇風潮暴作土石有一鏬之決鹹水衝入則田復塗矣往宋元管二百七十六頃八十三畆二角六十九步歸附後至元十八年方計畝起租每畆科徵米二升為儉於産米以鈔折焉每升淮中統鈔六分半則是每畝止科一錢三分此朝廷寛大之恩至元貞二年例行括勘應干隠瞞田土郡委州判提調自是出首叢然是歳秋省委官到府増塗田租税州縣率皆承意郡檄州判赴府講究州判謂吾州周遭皆海每歳秋潮捍海之隄必有決者不惟無米可收抑且無田可種實非其他州縣止一方一隅濱海之比若照例増租在官之入至微斯民之害無窮甚非朝廷愛養基本之意具狀請于省委官請于郡時路達嚕噶齊月列亦有志於民力主是議遂得不增象山亦援此例額亦仍舊自餘州縣增數多矣今有案可考至大徳元年遂管田四百六十一頃九十九畝三分視往宋已倍其數續奉上司㫖揮科徵正米而田又畧增大徳二年至管田四百九十八頃四十六畝八分實徵米九百九十六石九斗三升三合四勺四抄由是無寸田尺土之遺矣州判講究塗田租米狀月昌國州判官馮福京照驗八十一日承奉總府㫖揮為塗田租額勾請當職赴府定擬事奉此於今月十七日到府與各州縣官講究得海塗田畆各各州縣地勢髙低不等元科租額不同竊照昌國在環海中概管四鄉一十九都除富都一鄉與本州連陸外其餘三鄉都分俱各散在海洋不比其他州縣止是一邊靠海所有塗田周圍皆鹹鹵浸灌民自備本築􅖀隄岸使塗為田茍失時不修隄岸崩漏田復為塗其近隄岸田畆與鹹水為鄰止可種稗其去隄岸稍逺與山脚相接方可種稻若遇久旱則鹹氣蒸鬱禾盡枯槁設或久雨則山水泛溢禾盡淤没惟雨水調匀方可得熟并不及其他州縣下等所收之數又兼本州别無淡水河港其山水注下去處皆與潮通鹹水易以衝入以此並無肥田近據民户畢信等告亡宋時毎畆納蠻㑹十八界五百文歸附後起徵省米八合七抄有零折中統鈔一錢二分以中熟年分秋成價數言之亦可買折省米二升今擬塗田每畆科徵折省米二升似為相應之觀此申述則州民之貧乏亦可想見豈忍重賦哉廣惠院田土一頃四十四畆一分院在慶元路往宋縣以是田所入之租悉送上府以助供給孤老之用亦良法也貢士莊田土一頃六畆五分詳見前學校後社倉田三十九畆二分始末見前義莊田土一頃三十六畆六分始末見前義役田土一頃七十七畆往宋時衆役户捐已田歳一人掌之專以助有司科調之用曰義役河堰田一十畝五分坐落富九林唐􅓝十二處又四畆坐落安一都張家􅓝往宋未嘗起租户絶田畝四分斷没田十四畝六分逃避户田八畝九分三厘岱山教塲十畝舊以缺教閲弓兵之地職田田土四十一畝四厘以荒閑田土分撥州官充圭租之餘係官地山蕩共計二十頃六十七畝四分租錢中統鈔九定六兩三錢五分五厘户絶逃避斷没地一頃七十九畝九分五厘八毫六絲該租錢中統鈔四定一十四兩二錢三分五厘蕩二畝五分該租錢中統鈔三錢二分五厘户絶逃避斷没山一十八頃八十七畝四分該租錢中統鈔四定二十二兩六分寺觀田土一千丹五頃九十七畝不曾起租僧寺一千五頃一十一畝道觀八十六畝以上俱係省局報過數目食鹽始於至元二十七年抄數之後應諸色人户計口請買歳該二千五引一百四十三斤二兩四錢每引中統鈔五十貫民户間有逃移物故鄉都凋瘵實艱於錢大徳元年馮州判沿郡檄至行省適上司增添鹽價每引通該六十五貫州判謂州民貧乏而鹽價頓增甚非海鄉之利具以聞諸省䝉歳減十分之二實賣一千六百四引一百一十四斤海鄉之民既寛一年之内至大徳二年運司以鹽課壅滯遂缺増二千五百六十引本州遂分缺四千三引二百八十五斤是缺千四十八引使昨歳無一分缺歳有如缺之増吏與民豈不殆哉若將來鹽法流通則横增之數必在削去仍辦八分之數矣省劄減鹽㫖揮國江浙等處行中書省該據昌州判官馮福京呈本州坐落海心所轄四鄉一十九都除富都鄉九都與本州連陸外其餘三鄉十都並各散在海洋止是小小山島並無膏腴田土其間百姓止靠捕魚為活别無賣買生理鈔兩實為艱得每年計口請買食鹽勾追笞貴重費經營自二十七年抄數諸色户計有二萬二千四百餘户計一十萬三千五百餘口歳買食鹽二千零五引一百餘斤無問大小每口月該食鹽一十餘兩因此近年以來逃亡事故民户比元數已虧而鹽額如故多是里正主首及見在户口代為閉買年復一年已皆靠損兼海島别無蔬菜惟食鹹水魚鮮貧户無鹽亦可度日況今鹽價每引増上二十五貫則二千零五引比舊該増六百餘定必致愈見生受蓋海山之民多無常産若不從宜均定不惟失悞官課將恐民不聊生流為盜賊深繫利害乞照詳事得此行據兩浙都轉運司申照得昌國州週歳該鹽二千五引一百四十三斤二兩四錢今擬十分中量減二分該鹽四百一引二十八斤一十両八分外實該辦鹽一千六百四引一百一十四斤八兩三錢二分委為官民兩便省府除己行下兩浙運司準申外合下仰照驗行下合屬驗本州管下鄉都元𣲖食鹽數目以十分為率從實普例均減二分毋得因而作弊椿配仍嚴切禁治不致買食私鹽侵視官課違錯須至劄付者漁鹽歳辦不等舊實無之蓋附海之民歳造魚鮝多買有引客鹽為用官未賞置局也自至元三十年昉於燕參政南康人之奏於海邊捕魚時分令船户各驗船料大小赴局買鹽淹浥魚鮝然船户亦有不為漁者非官司驅迫鮮有樂於請買自是歳嚴一歳買數愈增大徳元年至買及八百餘引酒課周歳散辦一百一定四十九兩八錢八分以民苗之多寡為起課之嬴縮其無田而沽賣者亦在其數茶課周歳起催三定丹五兩六錢四分舊實無之始於至元三十年茶提舉司到州取勘為無茶園及磨茶户姑令各都認辦此數厯本錢每年止奉上司發下厯本數目解錢大厯每册中統鈔五百文小厯每張中統鈔五十文此官定價數也沙魚皮歳納九十四張本州實無所産至元十八年海都船户以其力之髙下請于官願輸其數以免差發乃在他處買納遂以為例厥後差發仍存而皮猶納焉富五都五張富七都六張安一都二張安二都四張蓬一二都二張蓬三四都四十一張蓬五都三十四張狸皮該二十張係捕户每年送納至元二十八年起徵魚鰾歳納八十斤於出産都分科徵始於至元三十年金一都一十斤金二都一十斤金三都二十斤金四都二十斤蓬三四都二十斤税課往宋以海鄉散漫止産魚鹽商賈之所不至故無征禁至元二十五年始置每月櫃辦中統鈔一定一十八兩六錢今增至三定半有竒矣昌國州圖志卷三
