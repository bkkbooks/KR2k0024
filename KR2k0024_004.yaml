body:
  text: 昌國州圖志卷四元馮福京等編敘山余聞山有南北條列如人之脈然有近而不相連有逺而實相續者其逺而相續者隔江河而不絶故大江以南之山皆來自梁綿延過九江接揚州分為二支其一由彭蠡接閩其一過湖口接吳然則南條陽列之山至定海而絶矣昌國之山何自而來哉信知其為瀛洲方丈之屬也鎮鰲山在海中屹然有六鰲背負之勢州治據其趾而坐鎮焉因以名其堂黃楊山在州東北通陸之處極巉巖嶮峻一峯傑出人目曰黃楊尖翁山一名翁洲去州東一舍抱朴子論古仙者之藥以登名山為上而以海中大島嶼若會稽之東翁洲之類者次之梅岑山在海之東世傳梅福煉丹之所因以名此山一名補陀落迦山佛書所謂海岸孤絶處詳見寶陀寺記舟山在州之南有山崒如枕海之湄以舟之所聚故名舟山大椎山即州治照山儼若屏障在前四望其形如一州民卜居者面此山為風水岝峉山在海之東山之巔産白艾重午人競採之詳見本草石門山在州東通陸逈絶處名極樂嶼下瞰大海渺無涯際旁有兩山對峙如門出入此彼則有兩都之隔惰農老人陳明可過此有詩題其石云兩山對立石為門疑隔桃源舊日村抬手欲敲終不得烟封霧鎖過黃昏雙髻山州山之最髙者距州治僅十里層巒聳結宛如雙髻烏龜巖在州之西山有一石狀如龜竹嶼山與舟山對境兩山夾峙上有叢竹附潮而上者由此謂之竹嶼門雲嶼山與竹嶼對峙山勢稍崇雲氣常滃鬱附潮而下者由此謂之雲嶼門盤嶼山與竹嶼山相左右中有一小聚落田可耕海可煮編亭置竈於內以其山勢環擁故曰盤丁家礁繇舟山解纜一餉可到左大茆港右螺頭洋亂石嶄然起乎中間潮溢則礁沒而不露舟人弗戒或與石遇則維楫俱亡令王與善為之攻堅植表以示來者屹然中流之砥柱螺頭山去州半潮有島突起海心其狀拳然如螺東藿山在海之東北環以大洋世傳徐福至此山有石宛如一枰修竹森立風枝拂掃常無纎塵桃花山在海之東南世𫝊安期生煉丹之所嘗以醉墨灑石成桃花紋因以為名馬跡山在海之東北安期生之洞在焉石同山在海之東北有石玲瓏故名岱山在海之北傳所謂岱輿蓬萊或者名始于此馬秦山在海之東南昔有碧雲庵馬耆禪師修道于此與黃給事龜年等聯句刻諸石有曰團團深鎖碧烟籠馬安隱禪居瑞氣中黃萬頃滄浪終夜月張居士光更於何處覓天宮黃承事嶽年蓮花峯與馬秦山碧雲庵對峙三石層出如蓮花上有佛腳跡拄杖印馬跡痕山之四隅各有小浮圖地産草一種名長生不死云順母山在海之東山側有石形如牛方外人謂石牛之口箭巖在馬秦後砂上有箭孔故名黃公山在海之南峯極峭峻絶頂有石碣字漫滅讀不句或云晉時隱者黃公善神術制白虎斃于此山故名塔嶺山在黃公山之南土人登山嘗見老僧趺坐石上因壘石為塔以拜之去嶺數十步有石婦人狀春月多杜鵑花鼓吹山在州東三十里山之隂曰戰洋曰馬􅓝偃王祠在其前其巔平如掌可容數百人風雨晦冥之時隱隱有鼓吹聲葛仙峯在州之金塘鄉一潮可至葛仙翁陳禪師金信郎同憩此山山之巔産桃一株花而不實舊有三仙堂遺址猶存仙翁煉丹井亢旱亦不枯刑馬在岱山之東北名秦頭父老相傳謂昔隋驃騎陳將軍奉命伐流求國領兵至此刑馬祭神今之英感廟靈濟侯是也洋山在蓬萊鄉之大海中因祠隋焬帝於此凡草不生白石磷磷殿前有池産緑毛龜如錢大若有神司之好事者不可得玉峯在岱山鷂子尖嶺下岡巒秀拔林樾蒼潤時有白霧蒙其巔人以為福地往宋乾德四年徙超果寺于其麓見之樓參政記寺鍾山在秀山去州隔一潮山之頂有古佛殿基階砌儼然旁有井甃以磚存而不毁凡遇隂晦隱隱聞鐘聲因以為名書字巖在寺鍾山之側一名桂竹嶼危巖懸覆若墜若浮俗傳羅隱嘗留題故名書字字跡猶髣佛可見佛嶼山在秀山上有一峯表表特立望之儼如丈六金身相旁睨如背負一小佛狀甚怪響巖在馬秦去州隔一潮巖石玲瓏遇隂晦則空洞有聲歇轎巖在馬秦上有石平闊五丈許昔黃給事結庵山側往來停車于此烏石塘在馬秦綿亘百餘丈髙可二丈許枕海之濱表裏皆青圓石子如龍之鱗甲然下注民田皆成沃壤天色晦冥則光怪間錯父老相傳謂舊無此塘一夕暴風雨挾而至黑碁子灣在烏石塘之左其形圓巧紺滑欲得之者必禱於神撒黑豆易之白碁子灣與黑碁子灣相望螺蚌之甲隨潮上下淘洗成質瑩潔光潤欲得之者撒白米易之香火礁在馬秦大海中每歲三月間大魚楊鬐鼓鬛從大洋來㑹于礁之下十二峯在朐山去州三潮山有十二尖若巫山然銅礁在朐山礁之右如銅水紺碧色碓砧山屬岱山北海至險處以山之形名之中有磁石西蘭山大箬山柳岸山石山滕􅓝山小竿山以上在南大竿山蘭山崑斗山缺山蛟山登部山黃砂山徐公山雙嶼山石珠山石馬山東勾曲山石牛山􅓝山以上在東浪港山深水山莆􅓝山陀山竹山洋山東蘭山西枯山東曉山東枯山桑子山舊名桑石石蜀山東朐山川石山北壁山西須山須皓山落華山青䦒山以上並在東北大磧山東乳山東岱山西朐山大洋山釣嶼山以上在北回峯山西良山長塗山三姑山灘山長白山西岱山正䇿山吳農山如岸山橫子山冊子山西桑山以上並在西北大茆山小茆山以上在東南敘水天地至大海次焉州中海而立有崇山峻嶺居其中者但見青天四垂忽波濤怒起萬怪畢陳而風月光霽一平如掌不觀於此豈知有江淮河海之衆細而歸諸大哉蜃池在州治前周十數丈方廣如一亢陽不枯舊𫝊蜃潛其中一名筆硯池東龍潭在州之東介萬夀衍慶兩山間據山之頂清徹無底上有龍王祠遇旱則禱之泄潭瀑布在州東北三十六里據山之腰往宋宣和中歲旱簿尉劉佖投以詩曰未躍天衢卧寂寥碧潭流溢海山腰埋藏頭角雖多日鼓動風雷在一朝既若有心成變化豈能無意澤枯焦神踪許為蒼生起願擊香車上九霄詩沈而雨至又薛主簿置有詩云秋髙水壯雪飛濤巖木招風怒竅號不是玉虹低澗飲白龍拖雨下山腰小􅓝潭在州西三十里餘遇旱則禱之有蜥蜴出焉漩潭在州北五里僅一堂坳水汲之不竭遇旱則祭之青龍潭在普慈寺之後山一泓鏡如禱雨則出青蛇以顯其異九節鰻潭在州東五里畦塍間一古井耳有人於其中得一鰻歸而臠之析為九將投諸釡怪風倏起視其鰻無有也他日復汲於井則鰻洋洋而出九節顯然鄉人神之以為龍遇旱必禱焉菖蒲潭在州西岑江之别嶼其潭深不可涯涘有菖葉生其中歲旱則禱之鄭山龍潭在州東大剪村有山危峭不可躋攀山之巔舊有石罅一村民因採樵浣垢衣其間視之則紺碧狀及其歸若有所慿依譫言觸龍之怒故然後遇旱禱之有金絲蜥蜴者出髙嶅山在州之岱山東南藏經云東海有山名曰髙嶅乃娑竭龍王所居之地上有亭宇遇旱鄉人禱之岱山龍潭依山之麓其潭有三相去數步闊不尋文深不盈尺禱旱投以尺書則有物若蟹捧而入間有狀如鰻者躍而出或誠不能感則既沈之書復浮于水惠泉井在州北一里深可二丈許往宋端拱二年所鑿也大旱不枯間有白蛇出現井之靈歟聖母池在道隆觀聖母殿之前方廣僅尋文舊創嶽祠邑有急足洪姓者詣兖州東嶽山取杯水歸鑿斯池以瀦之人有禱者攜紙錢一束投其中神或顧歆則倏然而墜若有掣之者不然則泛泛于上或者視此以為禍福之驗髙大山龍潭去州東三十里父老相傳有白龍乘雲而下雙睛駐地遂成龍淵卷石勺水旱暵不竭有青蜥蜴常現潭上遇旱則禱焉白泉湖在州東北舊周廣三十里瀦水灌田源泉沕涌值旱則桔槔輻輳黃馬溪在州西北十五里南墠水從茶嶺發源流注于海民田賴以灌溉下塘在州束蘆花村與補陀山相望隔一海舊有此塘父老相傳天氣晦冥凡三日劃然開霽自青山頭至橫山突起一塘一百餘丈其中皆小黑白石子豈非天作地設者耶灌門去州兩潮屹乎中流有一砥柱望之如人拱手而立水匯于此旋涌若沸舟行者必浮以物殺其勢而後過焉風雨將作有聲如雷震驚百里歲旱有所禱則持鐵篆以投之水輒騰起雨隨應或者為蛟龍之窟宅云嘉芹去州兩潮在黃公􅓝之北其水多芹取古人食芹之義因以名聖池在黃公􅓝之南舊傳此地聚落未成時有二尼築庵于古木下修浮屠業不知何許人因後徙居者衆二尼遁迹而去遺趾尚存中有池瀦水清洌可食至今以聖池名云岑江港去州西北三十里舊謂之六國港口南北舟舶輻輳於此亦海州之一鎮云橋梁市橋舊名狀元橋往宋紹熙三年令王阮創建第二橋第三橋皆在州市之南往宋明道初陳氏居士文諒自開封徙居於此捐資建此二橋人不病涉目為陳太翁橋曉峯橋去州西五里往宋淳熙十五年西監鹽人鮑謂建東江橋去州東五里舊亦陳太翁所建圮于風潮厥後太翁諸孫行覺城居士重為建造東新橋東江橋之第二橋虞家橋去州北三里虹橋去州北十里枕大溪形如卧虹南墠橋去州北二十里毛家橋去州北三十里岑江市心葛家橋去州二十里翁浦甬東橋去州十五里津渡舟山渡竿纜渡泗洲塘渡冊子渡金塘渡沈家門渡井舟山井州南沈山之趾去海不半武泓泉甘美可愛山海相接而鹹淡之味敻異豈泉脈有自來哉四眼井州治之北一井而四穴汲者競趨焉東井周莊井滕坑井碶堰慶豐碶岑江碶和尚碶翁浦碶蘆花碶甬東碶金魚碶敘物産土地所生風氣所宜不可以不書而多識於鳥獸草木之名爾雅之注不可誚也五穀田之近山者多旱乾近海者多斥鹵粳與糯咸不宜焉則平土能有幾何故歲得上熟僅可供州民數月之食全藉浙右客艘之米濟焉粳糯大麥小麥蕎麥黍麻粟黑豆菉豆赤豆布帛斥鹵之地桑麻皆非所宜民户間有髙阜之地始能種植可以株計故絲枲之利絶少絹苧布麻布禽類頻伽佛書著名補陀有之鵲鴿鳩山鵲雀鷹鸛鷗鷺鶯燕鸕鷀姑惡婆餅焦野鴨畫眉鴝鵒白頭翁繡眼黃頭山鷓百舌雪姑紅鶴蠟觜海族海物惟錯此固禹貢之所賦州雖在海中錯物視台溫及閩中最少未可概以海鍇貴之是州今書其實有者魟魚鱸魚鮵魚鯧魚梅魚春魚似石首而小者鱅魚石首魚一名鯼又名洋山魚鰉魚可為鮓帶魚鮆魚魚箬魚比目魚泥魚短魚華臍一名夀魚一作綬一名老婆魚一名琵琶魚以其形似之烏魚鯔魚鰣魚邵洋魚烏䲅魚一名河豚一名烏郎書篦魚黃魚鱟海鯽馬蛟魚黃鯽鰻水母竹夾魚章巨􅤤望潮香螺赤蝦苔蝦蛤蜊淡菜蝤蛑赤蟹桀步彭越蟶子白蟹有子者曰子蟹白蝦瓦壟辣螺丁螺拳螺生䗯地青龜腳彈塗河塘魚鯉鯽鱔鰍畜類牛羊犬豕雞鴨獸類獺野豕麂猴陵里甲花類牡丹芍藥海棠山茶丁香蘭瑞香錦帶紫笑望春八仙棣棠紫荆山丹酴醿月計緋桃鄭花石竹千葉桃薔薇荷花蜀葵紫薇薝蔔即梔子花雞冠麗春鳳仙又名滿堂紅鶯粟萱又名忘憂草玉屑木屑丹桂芙蓉菊蓀即秋蘭也梅花紅梅水仙苔梅玉簪果實櫻桃楊梅梅李瓜梨蓮葡萄棗枇杷柿椑銀杏林檎桃栗橘棖杏香欒石榴竹類斑竹苦竹紫竹淡竹筯竹南竹筀竹桃枝竹四季竹公孫竹藥類艾黃精磁石白蒺䔧半夏苦參天南星香附子蔬菜冬瓜梢瓜黃瓜笋瓠茼蒿莧苦藚薺菘菜蔔芥葱薤韭芹茄子蒜莙薘菠薐紫菜香菜蕨道士裙鹿角白菜油菜藝臺木類樟櫧檡棟松杉柏檜梧楓檮栁朴橡㮖桃楮檔椒烏桕皂角黃楊槿柘木蘭棕桑槐女貞一名冬青昌國州圖志卷四
