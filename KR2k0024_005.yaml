body:
  text: 昌國州圖志卷五元馮福京等編敘官體國經野設官為重官有內外崇卑之殊然皆為民計也一命以上可不慎哉州官逹嚕噶齊一員俸錢月三十貫中職田四頃知州一員同上同知州事一員俸錢月十五貫職田二頃判官一員俸錢月十三貫職田一頃半巡捕司判官兼大德二年五月始創弓兵三十名鎮守五所後始每歲一更有請正軍也本州岱山三姑北界浡塗僧司正正副各一員鹽司唐有十鹽富都居其一今正監是也宋熙寧六年析監為三曰正監曰東江曰蘆花又有三子場曉峯則𨽻正監甬東則𨽻東江桃花則𨽻蘆花此與州連陸場分也距州南潮有岱山場距岱山十五里有髙亭場歸附後置管勾每場各三員至元三十一年朝廷議汰冗官遂以東江屬正監髙亭屬岱山𨽻浙東鹽使司元貞元年廢各道鹽使改場為司置司令司丞管勾各一員鑄從七品印以重其事正監鹽司往宋東西監額止六千七百八十三袋每袋三百斤為一引歲辦鹽六千二百六十一引三百六十九斤每一引四百斤工本錢每引中統鈔一十貫本監舊皆鐵盤取土於六月兩汛之間八月始起煎亭户雖有上半年之逸若兩汛時分隂雨稍作則歲計遂誤大德元年管勾黃天祐始以上命巧出方略改鐵盤舊制用篾盤隨時取土一如他所春即起煎亭民遂得時用其力預期補辦無歲終積欠敲撲之峻實多便之人皆稱黃天祐之有才亦典史劉子敬顔園潘厚處置規畫之力云蘆花鹽司往宋額止四千袋每袋三百斤為一引歲辦鹽岱山鹽司往宋額止七千二百袋每袋三百斤為一引歲辦鹽七千七百六十九引每引四百斤巡檢司五處巡檢月俸一十貫田一頃螺頭在州之西隅七里弓兵三十名岑江在州之金三都弓兵二十名三姑在金塘鄉之烈港弓兵二十名岱山在蓬萊鄉之一二都兵三十名北界在蓬萊鄉之第五都弓兵三十名稅使司都監一員省差副使一員本路總管府差醫提領所提領二員昌國州圖志卷五
