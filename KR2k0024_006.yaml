body:
  text: 昌國州圖志卷六元馮福京等編敘人黃金丹砂明珠白璧珊瑚紫貝玳瑁翡翠紋犀象齒之物皆山海之藏所産也昌國據鼇背壓鯨波挾潮汐之膏腴旁日月之光景而地負海涵之所發泄薧鮮醎滷之外無一物之可貴何哉蓋精氣所生在於人而不在於物也故往宋南渡後人才輩出兩有躋政地者不亦貴於物歟進士題名舊有名石所以榮稽古而勸方來也往宋紹熙癸丑應傃始登進士第破天荒自是舉不乏人至元甲午欽覩聖㫖內一欵節該中書省議行貢舉之法欽此故特存之以備他日題名故事云應傃紹熙四年陳亮榜徐願太學開禧元年毛自知榜余開同上趙時慥嘉定四年趙建大榜趙時恪嘉定七年袁甫榜弟時慥孫枝同上孫起豫同上父枝應㒡嘉定十六年蔣童珍榜伯傃余天賜同上王文貫太學寶慶二年王㑹龍榜趙崇侜同上趙崇佾同上弟棠侜任嚴紹定五年徐元榜孫願質同上父枝趙時悟同上林虙同上王安道寶祐元年姚勉榜兄文貫劉應老寶祐文天祥榜應野太學內舍同上王一桂景定方山京榜應翼孫太學同上祖傃趙若誠宗學同上趙時吉咸淳元年阮登炳榜趙若諘宗學同上父時恪趙必同上趙必暰同上兄必范應發咸淳四年陳文龍榜陳􅘙同上陶回孫同上名賢任奕會稽典録云立言粲盛則有御史中丞句章任奕梁宏會稽典録稱為處士沈治唐乾元二年進孝經十卷授校書郎俞勉字勉道宋政和間入太學年才十有八時學在東京夏昞為博士鄉之游上庠者昉于此郭受貫河南府官至奉議郎終於長沙判官宋建炎間其子維徙居于此以北學教授諸生從者如雲葬于西湖之原榜曰郭先生墓其先以易學四世登科兩尚主冇官厯尚書及國子博士薛置字持志自號耘齊少以文鳴及長以聖人執權賦預鄉薦登慶元五年第調衡陽簿時史公彌堅帥湖南黑風洞冦相挻而起公被檄往撫諭將至洞有及其姓名者其酋忽言曰非四明作聖人執權賦薛置耶乃投戈而退應傃字自得自號蘭坡幼頴悟才四歲默誦語孟六歲賦江路野梅香有橫斜淡月黃昏漏泄早春消息之句鄉老咸異之登紹興癸丑進士第調烏程尉議毁淫祠獨存徐孺子廟德清有沈氏兄弟訟財郡俾公按實公委曲開曉沈有子適魁鄉薦因賦詩警之曰嘉木灌叢春意好可憐不種紫荆花兄弟感動其爭遂息官至文林郎湖南撫機子後字𢎞道從安晚鄭先生游見義必為鄉論推許壯游江淮信庵趙公一見竒之俾與籌幕禆贊維多制府上功將命以文學不果就右階官至修武郎孫名翼孫字子燕以詞賦入太學登景定三年進士第仕至修職郎曾孫實元貞元年詣闕上書授海南安撫副使奉使蘇龍國鄉人艷之徐願字恭先居岱山以詩學入太學登開禧元年進士第居官以廉平稱分牧平江繼而除福建提舉適黃勇變起帥漕皆束手退避獨公晏然無懼色身攖其鋒溫辭撫諭亂卒列拜于前曰提舉活佛也乃密指授虎翼都統周喜者殱其渠一方遂平入為司農卿兼都曹人謂公政事文學出於潔齊先生講貫之素云孫枝字吉甫邃於文嘗撰普慈寺羅漢閣記篤素張公大參見之稱賞曰海角有此竒士以兄之子妻之嘗登考亭夫子門有答孫吉甫書二子長起豫字商友與父同登甲戌進士第郡太守程公覃為立重桂坊初筮昭武户曹㑹有卒伍嘯呼于市公出撫諭衆乃曰孫司户清廉好官員不得相犯一州遂平立朝為監察御史終太常少卿官至朝散大夫次願質字去華未弱冠入太學作賦有聲繇舍選登紹定壬辰進士第初任分教池陽厯清要除諫官入中書官至朝散大夫應㒡字之道自號葺芷蘭坡先生之猶子也少穎悟長刻志于學凡經子史集與百家傳記靡不研覽從迂齊樓公先生游自是文聲日振咸愛敬之兩請漕薦嘉定癸未以詞賦魁南省初調清江校官次京教列屬上庠橫經朱邸入袐丘直鼇署既而丞玉牒兼南宮舍人淳祐四年冬四被除寵史館經筵翰林從槖官至中大夫參知政事封臨海郡侯有子法孫請鄉漕官至承議郎余天錫字純父自號畏齊世居甬東村其先少傅滌領袖邑庠公擢癸未進士第立登要津榮典鄉郡官至參知政事待宗族有義廩薨贈太師諡忠惠余天任字子大自號退齊忠惠公之弟嘗請漕舉以覃恩授初秩暨治郡有聲官至兵部尚書贈正議大夫趙時恪字恭仲自號茝坡嘉定辛未擢右科越甲戌再登進士第調池州青陽丞三仕于京薦甫及格竟以疾終伯氏時栗弱冠魁漕薦以覃恩授官隱德不仕其子若誠於景定元年宗學推恩季氏時慥登嘉定四年進士第調廣德建平簿次惟揚法掾既而司鍵左帑令髙郵興化改倅撫州鄉人以聯桂榮之任嚴字汝翼父正之早膺鄉薦隱德弗耀公忍貧力學預鄉薦一舉擢進士第初調德安民曹試令建陽分刺台城遷匠簿知廣德軍王文貫字貫道以詩學鳴弱冠薦于鄉登上庠占公闈首選擢寶慶丙戌進士第調儀真校官秩滿司鑰左帑尋除架閣掌教麟庠添倅東越弟安道先以來名與公同領鄉書甲午再薦擢寶祐癸丑進士第終于婺女學官名宦王安石往宋皇祐元年知明州鄞縣事嘗捧郡檄至此題回峯寺詩云山勢欲壓海禪扄向此開魚龍腥不到日月影先來樹色秋擎出鐘聲浪答回何期乘吏役暫此拂塵埃後熙寧四年入相封荆國公栁永字耆鄉嘗為曉峯鹽場官其鬻海歌云鬻海之民何所營婦無蠶織夫無耕衣食之原太寥落牢盆鬻就汝輸征年年春夏潮盈浦潮退刮泥成島嶼風乾日曝醎味加始灌潮波塯成滷滷濃醎淡未得間採樵深入無窮山豹蹤虎跡不敢避朝陽出去夕陽還船載肩擎未皇歇投入巨竈炎炎熱晨燒暮爍堆積髙才得波濤變成雪自從瀦滷至飛霜無非假貸充餱糧稱入官中得微直一緡往往十緡償周而復始無休息官租未了私租逼驅妻逐子課工程雖作人形俱菜色煮海之民何苦辛安得母富子不貧本朝一物不失所願廣皇仁到海濱甲兵淨洗征輸輟君民餘財罷鹽鐵太平相業爾惟鹽化作夏商周時節官至屯田員外郎史浩本郡人往宋紹興戊辰年為正監鹽官淳熙五年入相官至太師贈越王諡忠定紹定二年祠于道隆觀東偏榜曰真隱舊游參政余公天錫記心之精神是謂聖佛與人同此精神也佛虛明圓覺即人之英靈慧智佛莊嚴福德即人之富貴利逹故俊哲挻生謂之一佛出世而觀音大士能現宰官身者人與佛一而二二而一也彼霞錦蜚空雲花絢目異香芬郁於無色幻象呈露於有朕豈佛之精神自爾發見哉向非德詣乎充符心寥乎天一透三乘之正覺締五梵之殊因未易精契神交于倏忽之頃也四明寶陀環海一絶島乃觀音大士示現威神之地四方來竭敬者祈一覩瑞相而莫得豈大士靈感固靳於人特人之精神不足以感大士耳惟我太師丞相忠定越王攝事昌國一日航葦而至冥心作禮顧瞻徘徊寂無所見歸與瀾師論文殊圓通童子入法界事再至洞下有比丘指之曰巖有竇可以下瞰王攀援而上萬象洞豁瑞相倐現金色玉齒毫彩燦然大圓鏡中恍如悟對既而邂逅神僧揖而前曰公有結裏冦萊公也言訖而退竟失所往意者大士百億化身妙耶世皆以公台之貴現兆于此不知精契神交吻合無二故王以超世證佛已徑入文殊圓通之場而佛以應世委王不得辭萊公結裏之矚事之顛末固已留題于紹興戊辰之寺壁矣紹定改元春邑令詹仁澤發揚祕竒即道隆觀東偏建宇而祠之鳩工雖力翬飛未就冬趙汝浥實來絃歌靜間刃硎游裕公餘藏敬伏謁祠下睨其基誠拓矣則庳而弗崇也閲其圖誠工矣則齪而弗敞也耿光輔尉也林燀知監也左之右之經之營之巍創一室邃碩且顒丹雘輝輝用妥王靈堂列三楹實闢實閎可瞻可儀廊翼兩廡實衍實修可群可趨西附羽宫而通車備灑掃也東臨積水而建閣憩游觀也大門峙前新堤通道規模壯麗百倍於前向時巖竇下瞰之瑞相傳久為實録闌于獨倚之勝賞盡萃於目前顧不韙哉嘗聞之佛之為教爍羣昏而獨耀度般若而先涉潛通而廣被密讚而顯現百千萬億河沙世界無不普濟功亦楙矣及其離性離相空想空識欲斂萬冇於一無前詮後譯非不夸詡曾不足以扶植世教王以慈悲為心虛靜為性一游蘭若精契神交視貨利如蟻培等名爵如鴻毛一佛再見於佛國者厯三朝至再相三十六年間相業精神焜耀赫奕蒸從詒侑巍然為淳熙獨相慶澤流衍與宋無極三台符采再光奕世自嘉定更化以來大政令大紀綱雷霆衆聽日星群目太平咸觀登閎乎帝王之域亦既增光前聞人矣及手扶日轂再奠神器殊勳偉績又有以申國家無疆之休了此一大事因緣固真有佛力所不能到一念流通今在在精神矣是佛國有待於王而王豈有待於佛哉葛洪往宋嘉泰二年為昌國令官至參知政事生祠有記始于弱冠登東萊先生門四方從游之士以千計人受其教如羣飲於河隨其分量充然各有所得其後出處雖不同至蒞官行法多有足觀者人望之知其為吕氏之學子也而葛君容甫與余年齒甲乙相得歡甚後余試尉東陽容甫適滿秩歸里考德問業尤為詳密既而各東西去嘉泰二年余自越歸其冬容甫為令於吾州之昌國昌國古甬東也中駛而立去余所居鄞雖若甚逺然舟遇風而海朝發而午可至邑邑多余親故頌容甫之政者不容口容甫之政視民如子惟恐傷之視民之父兄猶其父兄視其害民者不啻如害己者民以訟至庭不忍鄙夷之為之明辨曲直了無毫髮枉遇事明敏吏之奸欺莫能逃然而不深窮其窟穴只使不病民而已民既感服每當受賦租第書其所入之數授之與之約不以吏扣門民如期而輸無肯負者山涯海瀕絶不見吏迹父老嘆謂前此令君固多賢若公則自冇邑以來未之有也容甫知民安其政思有以善之始新學宮以申義名堂吾兄文昌公為之記全州史君楊公又演其說其所以加意於邑人厚矣㑹於同年生應君傃自得方里居容甫自山間以禮聘之致館于邑西之筠坡帥邑人之子弟從焉公退至其處課其惰勤有小善奬之惟恐不及業有未精亦循循誘之大略薄漢能吏以為不足為又不屑以循吏名者居三年其效使民有餘蓄而吏日貧豪強斂手單弱者得職言相與為善者至恥入官府人務農立本不肻輕犯法非容甫中心誠然學道愛人安能使其效卓然如此哉容甫將終更諸儒父兄咸惜其去因民之欲繪其像于學以繫邑民無窮之思使無忘焉屬記于豫記未成容甫知之以書來言邦人非知我者且吾何以堪之吾將禁使勿為記毋庸作自得亦曰吾無補諸生願無載吾事又曰容甫知為政而已無愧于心不負其學容甫責也它何庸知之且自欲辟名而沒人之實不可因謂諸儒父兄祠立祠是也雖非令君意且為之勸謹勿為令君所奪竟立記有成焉容甫恥自衒鬻為人端嚴簡靜潔已廉甚譬如蘭生深林不求人知其馨終不可得而閟兩受郡侯薦墨皆未嘗有請列臺狀其政于朝竟莫知所從來此又近世所罕聞是宜特書以告世之馳騖者容甫名洪其學業未易量也開禧元年十一月旦日從政郎新差充廣德軍軍學教授樓鏞記昌國州圖志卷六
