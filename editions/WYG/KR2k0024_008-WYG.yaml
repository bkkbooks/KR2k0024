front:
  text: 昌國州圖志後序昌國州志成於是鄉儒而耆者之編視舊志寓詳於約有是事則有是辭凡異時荒唐繆悠之載悉皆刪去而其良法羙意則謹書之子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也猗歟盛哉聖朝本三代之仁是用車書混一統綱制度以漸舉行觀是集者亦粗可知是州之所損益也志之成實達嚕噶齊阿嚕缺
  hash: sha256:025d125cd95203b29ac82e2140d9308c26f21df45ebf850dc6899c63ae5e7b56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0024_WYG_008-1a, image: WYG0491/WYG0491-0318a.png}
body:
  text: 之力皆可書戊戌之秋八月告朔馮福京跋
  hash: sha256:725f4d478c4d4ed3ed1b58a5a04e60a39aefe98850e82361b20f8874d9b06a3b
